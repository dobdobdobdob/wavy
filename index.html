<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waveform</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #080808; overflow: hidden; cursor: none; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

    #cursor {
      position: fixed;
      width: 6px; height: 6px;
      background: #CCFF00;
      border-radius: 50%;
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
    }

    #upload-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; gap: 1.5rem;
      transition: opacity 1s ease;
    }
    #upload-screen.hide { opacity: 0; pointer-events: none; }

    .title {
      font-family: 'DM Mono', monospace;
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 300;
      color: #fff;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: fadeUp 1s ease 0.3s both;
    }
    .sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: fadeUp 1s ease 0.6s both;
    }
    .upload-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #000;
      background: #CCFF00;
      border: none;
      padding: 0.85rem 2.2rem;
      cursor: pointer;
      transition: all 0.2s;
      animation: fadeUp 1s ease 0.9s both;
    }
    .upload-btn:hover { background: #fff; }
    #fileInput { display: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #controls {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 1rem; z-index: 50;
      opacity: 0; transition: opacity 0.8s ease;
    }
    #controls.visible { opacity: 1; }

    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.45rem 1.1rem;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
    .btn.on { color: #CCFF00; border-color: #CCFF00; }

    #track {
      position: fixed; top: 1.75rem; left: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      opacity: 0; transition: opacity 0.8s;
    }
    #track.visible { opacity: 1; }

    #timer {
      position: fixed; top: 1.75rem; right: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.2);
      opacity: 0; transition: opacity 0.8s;
    }
    #timer.visible { opacity: 1; }

    #prog-wrap {
      position: fixed; bottom: 4.5rem;
      left: 2rem; right: 2rem; height: 1px;
      background: rgba(255,255,255,0.05);
      opacity: 0; transition: opacity 0.8s; cursor: pointer;
    }
    #prog-wrap.visible { opacity: 1; }
    #prog-fill { height: 100%; background: rgba(255,255,255,0.2); width: 0%; }
    #prog-fill::after {
      content: ''; position: absolute; right: 0; top: 50%;
      transform: translateY(-50%);
      width: 4px; height: 4px; background: #CCFF00; border-radius: 50%;
    }
  </style>
</head>
<body>

<div id="cursor"></div>

<div id="upload-screen">
  <div class="title">Waveform</div>
  <div class="sub">Upload a track and watch it come alive</div>
  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Choose File</button>
  <input type="file" id="fileInput" accept="audio/*">
</div>

<canvas id="c"></canvas>
<div id="track"></div>
<div id="timer"></div>
<div id="prog-wrap"><div id="prog-fill"></div></div>
<div id="controls">
  <button class="btn" id="playBtn" onclick="togglePlay()">Play</button>
  <button class="btn" onclick="restart()">Restart</button>
  <button class="btn" id="colorBtn" onclick="toggleColor()">Color</button>
  <button class="btn" id="spawnBtn" onclick="spawnBurst()">Burst</button>
  <button class="btn" onclick="clearAll()">Clear</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');

let W, H, dpr;
let mx = -1000, my = -1000;
let useColor = false;
let shapes = [];
let audioCtx, analyser, source, audioBuffer;
let isPlaying = false, startTime = 0, pauseOffset = 0, duration = 0;
let energy = 0;
let frame;

// ── RESIZE ──
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
}
window.addEventListener('resize', () => { resize(); });
resize();

// ── CURSOR ──
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});

// ── SHAPES ──
const SHAPE_TYPES = ['triangle', 'quad', 'pentagon', 'hexagon', 'line', 'cross', 'star'];

function randColor(alpha) {
  if (!useColor) return `rgba(255,255,255,${alpha})`;
  const colors = ['204,255,0', '79,142,247', '239,68,68', '16,185,129', '245,158,11', '168,85,247'];
  const c = colors[Math.floor(Math.random() * colors.length)];
  return `rgba(${c},${alpha})`;
}

function makeShape(x, y, energyScale = 1) {
  const type = SHAPE_TYPES[Math.floor(Math.random() * SHAPE_TYPES.length)];
  const size = (20 + Math.random() * 180) * energyScale;
  const angle = Math.random() * Math.PI * 2;
  const speed = 0.2 + Math.random() * 1.2 * energyScale;
  const dx = (Math.random() - 0.5) * speed;
  const dy = (Math.random() - 0.5) * speed;
  const spin = (Math.random() - 0.5) * 0.03;
  const life = 0.6 + Math.random() * 0.4;
  const lineW = 0.3 + Math.random() * 1.8;
  const alpha = 0.15 + Math.random() * 0.7;
  const sides = type === 'triangle' ? 3 : type === 'quad' ? 4 : type === 'pentagon' ? 5 : type === 'hexagon' ? 6 : 0;
  const color = randColor(1);

  return { type, x, y, size, angle, dx, dy, spin, life, age: 0, lineW, alpha, sides, color };
}

function spawnRandom() {
  const count = 1 + Math.floor(energy * 4);
  for (let i = 0; i < count; i++) {
    shapes.push(makeShape(
      Math.random() * W,
      Math.random() * H,
      0.5 + energy * 1.5
    ));
  }
  // Cap total shapes
  if (shapes.length > 300) shapes.splice(0, shapes.length - 300);
}

function spawnBurst() {
  for (let i = 0; i < 30; i++) {
    shapes.push(makeShape(
      mx + (Math.random() - 0.5) * 200,
      my + (Math.random() - 0.5) * 200,
      2
    ));
  }
}

function drawPolygon(x, y, sides, size, angle) {
  ctx.beginPath();
  for (let i = 0; i <= sides; i++) {
    const a = angle + (i / sides) * Math.PI * 2;
    const px = x + Math.cos(a) * size;
    const py = y + Math.sin(a) * size;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function drawLine(x, y, size, angle) {
  ctx.beginPath();
  ctx.moveTo(x + Math.cos(angle) * size, y + Math.sin(angle) * size);
  ctx.lineTo(x - Math.cos(angle) * size, y - Math.sin(angle) * size);
}

function drawCross(x, y, size, angle) {
  ctx.beginPath();
  ctx.moveTo(x + Math.cos(angle) * size, y + Math.sin(angle) * size);
  ctx.lineTo(x - Math.cos(angle) * size, y - Math.sin(angle) * size);
  ctx.moveTo(x + Math.cos(angle + Math.PI/2) * size, y + Math.sin(angle + Math.PI/2) * size);
  ctx.lineTo(x - Math.cos(angle + Math.PI/2) * size, y - Math.sin(angle + Math.PI/2) * size);
}

function drawStar(x, y, size, angle) {
  const pts = 5, inner = size * 0.4;
  ctx.beginPath();
  for (let i = 0; i <= pts * 2; i++) {
    const r = i % 2 === 0 ? size : inner;
    const a = angle + (i / (pts * 2)) * Math.PI * 2;
    const px = x + Math.cos(a) * r;
    const py = y + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
}

// ── CURSOR REPEL ──
function applyMouseForce(s) {
  const dx = s.x - mx, dy = s.y - my;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const radius = 120;
  if (dist < radius && dist > 0) {
    const force = (1 - dist / radius) * 3;
    s.dx += (dx / dist) * force * 0.08;
    s.dy += (dy / dist) * force * 0.08;
  }
}

// ── DRAW LOOP ──
function draw() {
  frame = requestAnimationFrame(draw);

  // Fade trail
  ctx.fillStyle = 'rgba(8,8,8,0.18)';
  ctx.fillRect(0, 0, W, H);

  // Audio energy
  if (analyser && isPlaying) {
    const freq = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(freq);
    const avg = freq.slice(0, 60).reduce((a, b) => a + b, 0) / 60;
    energy = avg / 255;
    if (Math.random() < 0.15 + energy * 0.6) spawnRandom();

    // Time
    const elapsed = audioCtx.currentTime - startTime;
    document.getElementById('timer').textContent = fmt(elapsed) + ' / ' + fmt(duration);
    document.getElementById('prog-fill').style.width = Math.min(elapsed / duration * 100, 100) + '%';
  } else {
    // Idle — slow trickle
    energy = 0.1;
    if (Math.random() < 0.04) spawnRandom();
  }

  // Update & draw shapes
  shapes = shapes.filter(s => s.age < s.life);
  shapes.forEach(s => {
    s.age += 0.004 + energy * 0.008;
    s.angle += s.spin;
    applyMouseForce(s);
    s.x += s.dx;
    s.y += s.dy;
    s.dx *= 0.995;
    s.dy *= 0.995;

    const t = s.age / s.life;
    const fade = t < 0.15 ? t / 0.15 : 1 - ((t - 0.15) / 0.85);
    const alpha = s.alpha * fade;
    const size = s.size * (1 + t * 0.4);

    // Color
    let strokeColor;
    if (useColor) {
      strokeColor = s.color.replace(/[\d.]+\)$/, `${alpha})`);
    } else {
      strokeColor = `rgba(255,255,255,${alpha})`;
    }

    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = s.lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    if (s.type === 'line') drawLine(s.x, s.y, size, s.angle);
    else if (s.type === 'cross') drawCross(s.x, s.y, size, s.angle);
    else if (s.type === 'star') drawStar(s.x, s.y, size, s.angle);
    else drawPolygon(s.x, s.y, s.sides, size, s.angle);

    ctx.stroke();
  });
}

// ── AUDIO ──
document.getElementById('fileInput').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById('upload-screen').classList.add('hide');
  setTimeout(() => {
    document.getElementById('controls').classList.add('visible');
    document.getElementById('timer').classList.add('visible');
    document.getElementById('track').classList.add('visible');
    document.getElementById('prog-wrap').classList.add('visible');
  }, 600);

  document.getElementById('track').textContent = file.name.replace(/\.[^/.]+$/, '').toUpperCase();

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;

  const buf = await file.arrayBuffer();
  audioBuffer = await audioCtx.decodeAudioData(buf);
  duration = audioBuffer.duration;

  pauseOffset = 0;
  play();
});

function play() {
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  source.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;
  document.getElementById('playBtn').textContent = 'Pause';
  document.getElementById('playBtn').classList.add('on');
  source.onended = () => {
    if (isPlaying) { isPlaying = false; pauseOffset = 0; document.getElementById('playBtn').textContent = 'Play'; document.getElementById('playBtn').classList.remove('on'); }
  };
}

function togglePlay() {
  if (!audioBuffer) return;
  if (isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop(); isPlaying = false;
    document.getElementById('playBtn').textContent = 'Play';
    document.getElementById('playBtn').classList.remove('on');
  } else {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    play();
  }
}

function restart() {
  if (!audioBuffer) return;
  if (isPlaying) { source.stop(); isPlaying = false; }
  pauseOffset = 0; play();
}

function toggleColor() {
  useColor = !useColor;
  document.getElementById('colorBtn').classList.toggle('on', useColor);
}

function clearAll() {
  if (isPlaying) { source.stop(); isPlaying = false; }
  audioBuffer = null; analyser = null; source = null;
  pauseOffset = 0; energy = 0; shapes = [];
  document.getElementById('controls').classList.remove('visible');
  document.getElementById('timer').classList.remove('visible');
  document.getElementById('track').classList.remove('visible');
  document.getElementById('prog-wrap').classList.remove('visible');
  document.getElementById('prog-fill').style.width = '0%';
  document.getElementById('playBtn').textContent = 'Play';
  document.getElementById('playBtn').classList.remove('on');
  document.getElementById('fileInput').value = '';
  const screen = document.getElementById('upload-screen');
  screen.style.transition = 'none';
  screen.style.opacity = '1';
  screen.classList.remove('hide');
  screen.style.pointerEvents = 'auto';
}

function fmt(s) {
  return Math.floor(s/60) + ':' + Math.floor(s%60).toString().padStart(2,'0');
}

document.getElementById('prog-wrap').addEventListener('click', e => {
  if (!audioBuffer) return;
  const pct = e.offsetX / e.currentTarget.offsetWidth;
  if (isPlaying) { source.stop(); isPlaying = false; }
  pauseOffset = pct * duration; play();
});

draw();
</script>
</body>
</html>
